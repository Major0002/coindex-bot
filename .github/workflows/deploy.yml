name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy to EC2
      env:
        PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        HOST: ${{ secrets.EC2_HOST }}
        USER: ${{ secrets.EC2_USER }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        SOL_DEPOSIT: ${{ secrets.SOL_DEPOSIT }}
        ETH_DEPOSIT: ${{ secrets.ETH_DEPOSIT }}
      run: |
        echo "$PRIVATE_KEY" > private_key.pem
        chmod 600 private_key.pem
        
        ssh -o StrictHostKeyChecking=no -i private_key.pem ${USER}@${HOST} "
          echo 'BOT_TOKEN=${BOT_TOKEN}' > /home/ubuntu/coindex-bot/.env
          echo 'SOL_DEPOSIT=${SOL_DEPOSIT}' >> /home/ubuntu/coindex-bot/.env
          echo 'ETH_DEPOSIT=${ETH_DEPOSIT}' >> /home/ubuntu/coindex-bot/.env
          
          cd /home/ubuntu/coindex-bot
          git pull origin main
          source venv/bin/activate
          pip install -r requirements.txt --quiet 2>/dev/null || true
          
          # Restart bot
          sudo systemctl restart coindex-bot
        "