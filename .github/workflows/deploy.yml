name: Deploy to AWS EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy to EC2
      env:
        PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        HOST: ${{ secrets.EC2_HOST }}
        USER: ${{ secrets.EC2_USER }}
      run: |
        echo "$PRIVATE_KEY" > coindex.pem
        chmod 600 coindex.pem
        
        ssh -o StrictHostKeyChecking=no -i coindex.pem ${Ubuntu}@${34.238.193.50} '
          echo "🚀 Deploying COIN DEX AI Bot..."
          
          cd /home/ubuntu/coindex-bot
          
          # Pull latest changes
          git fetch origin
          git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
          git pull origin $(git rev-parse --abbrev-ref HEAD)
          
          # Install dependencies
          source venv/bin/activate
          pip install -r requirements.txt --quiet 2>/dev/null || true
          
          # Restart bot
          sudo systemctl restart coindex-bot
          
          # Check status
          sleep 3
          sudo systemctl status coindex-bot --no-pager | head -5
          
          echo "✅ Deployment complete!"
        '